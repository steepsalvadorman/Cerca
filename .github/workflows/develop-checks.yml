name: Develop sanity checks

# Fast feedback for the develop branch: just confirms both the Flutter
# app and the Rust backend still compile. No tests, no deploys — those
# only happen on main (see android-distribute.yml / backend-deploy.yml).
on:
  push:
    branches: [develop]
  workflow_dispatch: {}

jobs:
  flutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: cargo check
